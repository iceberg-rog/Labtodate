server {
    listen 80 default_server;
    listen [::]:80 default_server;
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name lab2date.com www.lab2date.com _;

    ssl_certificate     /etc/nginx/ssl/lab2date.crt;
    ssl_certificate_key /etc/nginx/ssl/lab2date.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 25m;
add_header X-Content-Type-Options "nosniff" always;    add_header X-Frame-Options "SAMEORIGIN" always;    add_header Referrer-Policy "strict-origin-when-cross-origin" always;    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Self-hosted media (MinIO) — no external dependency
    location /media/ {
        proxy_pass http://127.0.0.1:9000/;
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_intercept_errors off;
        add_header Cache-Control "public, max-age=2592000";
    }

    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
server {
    listen 443 ssl ;
    listen [::]:443 ssl ;
    server_name labtodate.com www.labtodate.com; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/labtodate.com/fullchain.pem; # managed by Certbot
