}server {
    if ($host = www.labtodate.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = labtodate.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80 ;
    listen [::]:80 ;
    server_name labtodate.com www.labtodate.com;
    return 404; # managed by Certbot




}